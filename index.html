<style>/* JK Collective — global styles */

:root {
  /* warm (default) */
  --bg: #EFEBE2;
  --bg-2: #E5DFD1;
  --ink: #1A1714;
  --ink-2: #4A443C;
  --ink-3: #8A8478;
  --rule: #1A17141a;
  --accent: oklch(0.52 0.10 48);
  --panel: #F6F3EB;
}

[data-palette="dark"] {
  --bg: #0D0C0A;
  --bg-2: #151310;
  --ink: #F1EDE4;
  --ink-2: #C6C0B3;
  --ink-3: #7A7569;
  --rule: #F1EDE41a;
  --accent: oklch(0.70 0.10 48);
  --panel: #1C1A16;
}

[data-palette="light"] {
  --bg: #FAFAF7;
  --bg-2: #F1F0EA;
  --ink: #0E0E0C;
  --ink-2: #3B3A36;
  --ink-3: #8B8A83;
  --rule: #0E0E0C14;
  --accent: oklch(0.52 0.10 48);
  --panel: #FFFFFF;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { background: var(--bg); color: var(--ink); transition: background .35s ease, color .35s ease; }

body {
  font-family: 'Inter Tight', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
  font-size: 15px;
  line-height: 1.45;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  letter-spacing: -0.005em;
}

.serif { font-family: 'Gloock', 'Didot', 'Bodoni 72', 'Times New Roman', serif; font-weight: 400; letter-spacing: -0.01em; }
.mono { font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace; font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; }

a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }

/* Nav */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 22px 36px;
  background: color-mix(in srgb, var(--bg) 78%, transparent);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--rule);
}
.nav .logo { justify-self: start; }
.nav-links { display: flex; gap: 44px; justify-self: center; }
.nav-links a {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-2); padding: 6px 0;
  position: relative;
}
.nav-links a:hover, .nav-links a.active { color: var(--ink); }

  };

  const palettes = [
    {id:'warm', label:'Warm', c1:'#EFEBE2', c2:'#1A1714'},
    {id:'light', label:'Paper', c1:'#FAFAF7', c2:'#0E0E0C'},
    {id:'dark', label:'Ink', c1:'#0D0C0A', c2:'#F1EDE4'},
  ];
  const heroes = [
    {id:'a', label:'Split'},
    {id:'b', label:'Full-bleed'},
    {id:'c', label:'Typographic'},
  ];

  const IMG_CHOICES = [
    'assets/img/hero-01.jpg',
    'assets/img/hero-02.jpg',
    'assets/img/hero-03.jpg',
    'assets/img/hero-04.jpg',
    'assets/img/hero-05.jpg',
    'assets/img/hero-06.jpg',
    'assets/img/hero-home.jpg',
  ];
  const objectImgs = state.objectImgs || [null,null,null,null,null,null];
  const setObjectImg = (idx, val) => {
    const next = [...objectImgs];
    next[idx] = val;
    set('objectImgs', next);
  };
  const baseFeatured = (window.JK_WORKS||[]).slice(0,6);

  return (
    <div className="tweaks-panel">
      <div className="tweaks-close" onClick={()=>setVisible(false)}>×</div>
      <div className="row">
        <h5>Palette</h5>
        <div className="swatch-row">
          {palettes.map(p => (
            <div key={p.id} title={p.label}
                 className={`swatch ${state.palette===p.id?'active':''}`}
                 style={{background: `linear-gradient(135deg, ${p.c1} 50%, ${p.c2} 50%)`}}
                 onClick={()=>set('palette', p.id)} />
          ))}
        </div>
      </div>
      <div className="row">
        <h5>Hero layout</h5>
        <div className="opt-row">
          {heroes.map(h => (
            <div key={h.id} className={`opt ${state.heroVariant===h.id?'active':''}`}
                 onClick={()=>set('heroVariant', h.id)}>{h.label}</div>
          ))}
        </div>
      </div>

      <div className="row">
        <h5>Objects on view — images</h5>
        <div style={{fontSize:10, color:'var(--ink-3)', marginBottom:8, letterSpacing:'.06em', lineHeight:1.5}}>
          Override images for each of the 6 home-page grid slots. Changes save to disk automatically.
        </div>
        <div style={{display:'flex', flexDirection:'column', gap:8}}>
          {baseFeatured.map((w, i) => {
            const current = objectImgs[i] || w.img;
            const isOverridden = !!objectImgs[i];
            return (
              <div key={i} style={{display:'grid', gridTemplateColumns:'44px 1fr', gap:8, alignItems:'center'}}>
                <div style={{
                  aspectRatio:'1/1',
                  background:`url(${current}) center/cover no-repeat`,
                  border: isOverridden ? '2px solid #7a8a5a' : '1px solid var(--rule)',
                  borderRadius: 2,
                }} />
                <div style={{display:'flex', flexDirection:'column', gap:2, minWidth:0}}>
                  <div style={{fontSize:10, fontFamily:'JetBrains Mono, monospace', letterSpacing:'.04em', color:'var(--ink-3)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>
                    #{i+1} · {w.title}
                  </div>
                  <select
                    value={objectImgs[i] || '__default__'}
                    onChange={(e) => {
                      const v = e.target.value;
                      setObjectImg(i, v === '__default__' ? null : v);
                    }}
                    style={{
                      fontSize: 11,
                      fontFamily: 'JetBrains Mono, monospace',
                      padding: '4px 6px',
                      border: '1px solid var(--rule)',
                      background: 'var(--paper-2)',
                      color: 'var(--ink)',
                      borderRadius: 2,
                      cursor: 'pointer',
                    }}
                  >
                    <option value="__default__">(default — {w.img.split('/').pop()})</option>
                    {IMG_CHOICES.map(choice => (
                      <option key={choice} value={choice}>{choice.split('/').pop()}</option>
                    ))}
                  </select>
                </div>
              </div>
            );
          })}
        </div>
        <div style={{marginTop:10}}>
          <button onClick={()=>set('objectImgs', [null,null,null,null,null,null])}
                  style={{fontSize:10, fontFamily:'JetBrains Mono, monospace', background:'none', border:'1px solid var(--rule)', padding:'4px 10px', cursor:'pointer', color:'var(--ink-2)', letterSpacing:'.08em', textTransform:'uppercase'}}>
            Reset all
          </button>
        </div>
      </div>
      <div style={{fontSize:9, color:'var(--ink-3)', marginTop: 12, letterSpacing:'.1em'}}>JK · Tweaks v1</div>
    </div>
  );
}

function App() {
  // Route: home, artists, artist/:id, works, work/:id, press, visit
  const initialHash = window.location.hash.replace(/^#\/?/, '') || 'home';
  const [route, setRoute] = useState(() => localStorage.getItem('jk-route') || initialHash);
  const [lightbox, setLightbox] = useState(null);
  const [tweaks, setTweaks] = useState(window.TWEAK_DEFAULS);

  // Expose navigate
  window.jkNavigate = (r) => {
    setRoute(r);
    localStorage.setItem('jk-route', r);
    window.location.hash = `/${r}`;
    window.scrollTo({top: 0, behavior: 'instant'});
  };

  useEffect(() => {
    document.body.setAttribute('data-palette', tweaks.palette || 'warm');
  }, [tweaks.palette]);

  useEffect(() => {
    const onHash = () => {
      const r = window.location.hash.replace(/^#\/?/, '') || 'home';
      setRoute(r);
      localStorage.setItem('jk-route', r);
    };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  // Route resolution
  let page;
  const [base, param] = route.split('/');
  if (base === 'home' || base === '') page = <HomePage heroVariant={tweaks.heroVariant} objectImgs={tweaks.objectImgs||[]} onOpenWork={setLightbox} />;
  else if (base === 'artists') page = <ArtistsPage />;
  else if (base === 'artist' && param) page = <ArtistDetailPage artistId={param} onOpenWork={setLightbox} />;
  else if (base === 'works') page = <WorksPage onOpenWork={setLightbox} />;
  else if (base === 'work' && param) page = <WorkDetailPage workId={param} onOpenWork={setLightbox} />;
  else if (base === 'press') page = <PressPage />;
  else if (base === 'exhibitions') page = <ExhibitionsPage onOpenWork={setLightbox} />;
  else if (base === 'visit') page = <VisitPage />;
  else page = <HomePage heroVariant={tweaks.heroVariant} objectImgs={tweaks.objectImgs||[]} onOpenWork={setLightbox} />;

  return (
    <>
      <Nav route={route} />
      <div key={route}>{page}</div>
      {lightbox && <Lightbox work={lightbox} onClose={()=>setLightbox(null)} />}
      <TweaksPanel state={tweaks} setState={setTweaks} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>


</body></html>
